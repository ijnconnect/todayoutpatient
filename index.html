<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920, initial-scale=1.0" />
<title>Today's Outpatients</title>

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;700;900&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  font-family: "Figtree", Arial, sans-serif;
  background: #0b5f91;
}

.poster {
  width: 1080px;
  height: 1920px;
  position: relative;
  background-image: url("background.png");
  background-size: 1080px 1920px;
  background-position: center;
  background-repeat: no-repeat;
  color: white;
}

.content {
  position: absolute;
  top: 570px;
  width: 100%;
  text-align: center;
}

.title {
  font-size: 72px;
  font-weight: 900;
  margin-bottom: 24px;
}

.date {
  font-size: 52px;
  font-weight: 500;
  margin-bottom: 90px;
}

.number {
  font-size: 280px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 70px;
}

.subtitle {
  font-size: 66px;
  font-weight: 900;
  color: #bfe4ff;
}

.status {
  position: absolute;
  bottom: 22px;
  width: 100%;
  text-align: center;
  font-size: 18px;
  color: rgba(255,255,255,0.7);
}
</style>
</head>

<body>

<div class="poster">
  <div class="content">
    <div class="title">Today’s Outpatients</div>
    <div class="date" id="date">Loading...</div>
    <div class="number" id="count">--</div>
    <div class="subtitle">Hearts Served Today</div>
  </div>

  <div class="status" id="status">Connecting to Google Sheet...</div>
</div>

<script>
const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRkSHuwMFhdfcEaQnjFi00S0GtQ5QioagbII8AYPtGbewBsOOm2BoHXNyw2E2fs2vk6dAJm12lvPxah/pub?output=csv";

function clean(v) {
  return v ? String(v).trim() : "";
}

function parseCSV(text) {
  const rows = text.trim().split(/\r?\n/).map(parseCSVRow);
  const headers = rows.shift().map(clean);

  return rows.map(row => {
    const obj = {};
    headers.forEach((h, i) => {
      obj[h] = clean(row[i]);
    });
    return obj;
  });
}

function parseCSVRow(row) {
  const result = [];
  let current = "";
  let insideQuotes = false;

  for (let i = 0; i < row.length; i++) {
    const char = row[i];

    if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === "," && !insideQuotes) {
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result;
}

function getToday() {
  return new Date().toLocaleDateString("en-GB", {
    timeZone: "Asia/Kuala_Lumpur",
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  });
}

function formatDate(d) {
  const [day, month, year] = d.split("/");
  const date = new Date(`${year}-${month}-${day}T00:00:00+08:00`);

  return date.toLocaleDateString("en-GB", {
    timeZone: "Asia/Kuala_Lumpur",
    day: "numeric",
    month: "long",
    year: "numeric"
  });
}

async function loadData() {
  try {
    const res = await fetch(SHEET_URL + "&t=" + Date.now());
    const text = await res.text();
    const data = parseCSV(text);

    const today = getToday();

    const todayRow = data.find(row =>
      clean(row["Date"]) === today
    );

    document.getElementById("date").innerText = formatDate(today);

    if (!todayRow) {
      document.getElementById("count").innerText = "0";
      document.getElementById("status").innerText =
        "No data found for today (" + today + ")";
      return;
    }

    document.getElementById("count").innerText =
      clean(todayRow["Total Outpatient"]) || "0";

    document.getElementById("status").innerText =
      "Last updated: " +
      new Date().toLocaleString("en-MY", {
        timeZone: "Asia/Kuala_Lumpur"
      });

  } catch (err) {
    document.getElementById("count").innerText = "--";
    document.getElementById("status").innerText = "Error loading data";
  }
}

loadData();
setInterval(loadData, 300000);
</script>

</body>
</html>
